name: Convert Ruleset-reward
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 北京时间12点

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 必须加，否则无法推送

    steps:
    - name: Checkout代码
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: 设置上海时区
      run: |
        sudo rm -rf /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        date

    - name: 下载 mihomo
      run: |
        curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
        gzip -d mihomo.gz
        chmod +x mihomo

    - name: 生成域名列表
      run: |
        curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/reward | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

    - name: 构建 MRS 文件
      run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

    # 👇 这是修复核心：强制提交 + 强制推送，保证文件一定更新
    - name: 提交并推送更新
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add 10007.mrs
        git commit -m "Auto Update $(date '+%Y-%m-%d %H:%M:%S')" --allow-empty
        git push --force
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
