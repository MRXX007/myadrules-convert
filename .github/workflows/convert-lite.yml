name: Convert Ruleset
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 北京时间12点

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置时区
      run: |
        sudo rm -rf /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        date

    - name: Download mihomo
      run: |
        curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
        gzip -d mihomo.gz
        chmod +x mihomo

    - name: Generate domain list
      run: |
        curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

    - name: Build MRS
      run: ./mihomo convert-ruleset domain text list.txt 10007-lite.mrs

    - name: Push changes
      run: |
        git config --global user.name "Auto Update"
        git config --global user.email "action@github.com"
        git add 10007-lite.mrs
        git commit -m "Update $(date '+%Y-%m-%d %H:%M')" --allow-empty
        git push --force https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
