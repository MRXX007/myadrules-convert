name: Convert Ruleset
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 北京时间12点

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download mihomo
      run: |
        curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
        gzip -d mihomo.gz
        chmod +x mihomo

    - name: Generate domain list
      run: |
        curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

    - name: Build MRS
      run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

    # 👇 👇 👇 这一段是全新的！强制提交，绝对会更新！
    - name: Push changes
      run: |
        git config --global user.name "Auto Update"
        git config --global user.email "action@github.com"
        git add 10007.mrs
        git commit -m "Auto Update $(date '+%Y-%m-%d %H:%M')"
        git push
