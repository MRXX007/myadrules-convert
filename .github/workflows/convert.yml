name: Convert Ruleset
on:
  workflow_dispatch:

jobs:
  run_convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download and Prepare
        run: |
          # 1. 使用 GitHub 的自动重定向获取最新版，不再手动拼链接
          # 这里的链接指向 MetaCubeX 官方仓库的最新发布版
          curl -L -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.tar.gz"
          
          # 2. 解压
          tar -xzf mihomo.tar.gz
          
          # 3. 寻找解压出的可执行文件并改名为 mihomo
          # 不管它叫 mihomo-linux-amd64 还是别的，只要是这个开头就改名
          find . -maxdepth 1 -name "mihomo-linux-amd64*" -exec mv {} mihomo \;
          chmod +x mihomo
          
          # 4. 获取数据并清洗
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

      - name: Build MRS
        run: |
          # 确保文件存在再运行
          if [ -f "./mihomo" ]; then
            ./mihomo convert-ruleset domain text list.txt 10007.mrs
          else
            echo "错误：找不到 mihomo 执行文件"
            ls -l
            exit 1
          fi

      - name: Save to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 10007.mrs
          git commit -m "Update MRS $(date)" || echo "No changes"
          git push
