name: Convert Ruleset-all
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 北京时间12点

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置时区
      run: |
        sudo rm -rf /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        date

    - name: Download mihomo
      run: |
        curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
        gzip -d mihomo.gz
        chmod +x mihomo

    - name: Generate domain list
      run: |
        curl -s "https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all?v=$(date +%s)" | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt
       
    - name: Build MRS
      run: |
        rm -f 10007.mrs # 强制删除旧文件确保重写
        ./mihomo convert-ruleset domain text list.txt 10007.mrs
    - name: Push changes
      run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 检查文件是否有变化
          git add 10007.mrs list.txt
          
          # 如果没有变化就退出，不产生无意义的 commit
          if git diff --staged --quiet; then
            echo "No changes detected, skipping commit."
            exit 0
          fi

          git commit -m "Update rules $(date '+%Y-%m-%d %H:%M')"
          # 建议去掉 --force，使用普通 push
          git push origin HEAD:${{ github.ref }}
