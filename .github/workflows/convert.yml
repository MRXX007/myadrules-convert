name: Convert Ruleset-all
on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'  # 北京时间12点

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 设置时区
      run: |
        sudo rm -rf /etc/localtime
        sudo ln -s /usr/share/zoneinfo/Asia/Shanghai /etc/localtime
        date

    - name: Download mihomo
      run: |
        curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
        gzip -d mihomo.gz
        chmod +x mihomo

    - name: Generate domain list
      run: |
          # 1. 抓取并清洗数据：
          # - grep 提取 0.0.0.0
          # - awk 提取域名
          # - sed 's/\.$//' 去掉域名末尾的句点（解决你日志里的 invalid domain 报错）
          # - tr -d '\r' 去掉 Windows 换行符
          curl -s -L "https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all" | \
          grep '^0\.0\.0\.0' | awk '{print $2}' | sed 's/\.$//' | tr -d '\r' > list.txt
          echo "清洗后的规则行数："
          wc -l list.txt

    - name: Build MRS
      run: |
          # 强制彻底清理旧文件
          rm -f 10007.mrs
          ./mihomo convert-ruleset domain text list.txt 10007.mrs
          echo "转换完成"

    - name: Push changes
      run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add 10007.mrs list.txt
          
          # 这里的修改最关键：如果没变化，也强制提交一个空 commit，确保 Action 状态同步
          if git diff --staged --quiet; then
            echo "内容无变化，强制空提交以刷新仓库时间戳"
            git commit -m "Keep alive: $(date '+%Y-%m-%d %H:%M')" --allow-empty
          else
            git commit -m "Update rules: $(date '+%Y-%m-%d %H:%M')"
          fi
          
          # 使用 push -f 确保万无一失推送到 main 分支
          git push origin HEAD:main --force
