name: Convert Ruleset
on:
  workflow_dispatch:

jobs:
  run_convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2
      
      - name: Download and Prepare
        run: |
          # 1. 下载内核
          curl -L -o mihomo.tar.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.18.3/mihomo-linux-amd64-v1.18.3.tar.gz
          
          # 2. 解压
          tar -xzf mihomo.tar.gz
          
          # 3. 【关键修复】找到解压出来的那个程序并重命名为 mihomo
          # 使用通配符找到以 mihomo-linux-amd64 开头的文件并改名
          find . -name "mihomo-linux-amd64*" -exec mv {} mihomo \;
          chmod +x mihomo
          
          # 4. 获取 Hosts 并提取域名
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt
          
          # 打印当前目录文件列表，方便报错时排查
          ls -l

      - name: Build MRS
        run: |
          # 运行转换命令
          ./mihomo convert-ruleset domain text list.txt 10007.mrs

      - name: Save to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 10007.mrs
          git commit -m "Update MRS $(date)" || echo "No changes"
          git push
