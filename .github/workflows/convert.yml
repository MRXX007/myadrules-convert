name: Convert Ruleset-all
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 北京时间 11:00

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 下载 mihomo
      - name: Download mihomo
        run: |
          curl -L --retry 3 -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          gzip -d mihomo.gz
          chmod +x mihomo

            # 生成域名列表 (加入随机参数绕过缓存)
      - name: Generate domain list
        run: |
          # 使用 $(date +%s) 生成一个秒级时间戳，加在 URL 后面
          curl -sL --retry 3 "https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all?v=$(date +%s)" | \
          grep '^0\.0\.0\.0' | awk '{print $2}' | sort -u > list.txt
          
          # 打印一下行数，在 Actions 日志里就能直接看到数量对不对
          echo "当前抓取到的规则条数："
          wc -l list.txt

      # 强制更新并记录行数
      - name: Force Commit & Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 自动计算 list.txt 的行数
          LINES=$(wc -l < list.txt)
          
          # 2. 强制添加文件（不管它变没变）
          git add -f 10007.mrs
          
          # 3. 把行数写进提交信息，这会让每次 Commit 都不一样
          # 就算文件没变，Commit 信息变了，也会触发更新
          git commit -m "Confirmed: ${LINES} lines [$(date '+%Y-%m-%d %H:%M:%S')]"
          
          # 4. 强制推送
          git push origin HEAD:${{ github.ref_name }} --force
