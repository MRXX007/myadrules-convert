name: Convert Ruleset
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 北京时间 11:00

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 下载 mihomo
      - name: Download mihomo
        run: |
          curl -L --retry 3 -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          gzip -d mihomo.gz
          chmod +x mihomo

      # 生成域名列表
      - name: Generate domain list
        run: |
          curl -s --retry 3 https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | \
          grep '^0\.0\.0\.0' | awk '{print $2}' | sort -u > list.txt

            # 构建 MRS (先删除旧的，确保生成的是全新的)
      - name: Build MRS
        run: |
          rm -f 10007.mrs
          ./mihomo convert-ruleset domain text list.txt 10007.mrs
          ls -lh 10007.mrs

      # 👇 真正的强制更新逻辑
      - name: Force Commit & Push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 1. 强制将新生成的 mrs 加入暂存区
          git add -f 10007.mrs
          
          # 2. 无论内容是否变化，都强制提交
          # --allow-empty 是为了防止 Git 认为内容没变而报错
          git commit -m "Daily Update: $(date +'%Y-%m-%d %H:%M:%S')" --allow-empty
          
          # 3. 强制推送到当前分支 (通常是 main)
          # 使用 --force 确保覆盖远程文件
          git push origin HEAD:${{ github.ref_name }} --force
