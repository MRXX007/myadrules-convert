name: Convert Ruleset
on:
  workflow_dispatch:

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Download and Prepare
        run: |
          MIHOMO_VERSION="v1.18.7"
          curl -L -o mihomo.tar.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VERSION}/mihomo-linux-amd64-${MIHOMO_VERSION}.tar.gz"
          tar -xzf mihomo.tar.gz
          mv mihomo-linux-amd64-${MIHOMO_VERSION} mihomo
          chmod +x mihomo
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

      - name: Build MRS
        run: |
          ./mihomo convert-ruleset domain text list.txt 10007.mrs

      - name: Save to Repo
        uses: EndBug/add-and-commit@v9
        with:
          message: 'Update MRS $(date)'
          add: '10007.mrs'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
