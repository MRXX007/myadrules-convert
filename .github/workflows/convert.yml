name: Convert Ruleset
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 北京时间 11:00

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 下载 mihomo
      - name: Download mihomo
        run: |
          curl -L --retry 3 -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          gzip -d mihomo.gz
          chmod +x mihomo

      # 生成域名列表
      - name: Generate domain list
        run: |
          curl -s --retry 3 https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | \
          grep '^0\.0\.0\.0' | awk '{print $2}' | sort -u > list.txt

      # 构建 MRS
      - name: Build MRS
        run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

      # 👇 强制更新！不管内容有没有变化，都提交！
      - name: Force Commit & Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add 10007.mrs
          git commit -m "Daily Update MRS [$(date '+%Y-%m-%d %H:%M:%S')]" --allow-empty
          git push
