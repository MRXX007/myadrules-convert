name: Convert Ruleset
on:
  workflow_dispatch:

jobs:
  run_convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Build Mihomo and Convert
        run: |
          # 1. 直接拉取 Mihomo 源码并编译 (只需几秒钟)
          # 我们只需要它的转换功能，不需要完整功能，这样最快
          go install github.com/MetaCubeX/mihomo@latest
          
          # 2. 找到编译好的二进制文件 (通常在 ~/go/bin/mihomo)
          export PATH=$PATH:$(go env GOPATH)/bin
          
          # 3. 获取数据并清洗
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt
          
          # 4. 执行转换
          mihomo convert-ruleset domain text list.txt 10007.mrs
          
          # 检查文件是否生成
          ls -l 10007.mrs

      - name: Save to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 10007.mrs
          git commit -m "Update MRS $(date)" || echo "No changes"
          git push
