name: Convert Ruleset
# 👇 全局强制 Node.js 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # 每天 北京时间 11:00

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4.3.0

      - name: Download mihomo
        run: |
          curl -L -o mihomo.gz https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          gzip -d mihomo.gz
          chmod +x mihomo

      - name: Generate domain list
        run: |
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

      - name: Build MRS
        run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

      - name: Save to Repo
        uses: EndBug/add-and-commit@v9.1.4
        with:
          message: "Daily Update MRS"
          add: "10007.mrs"
