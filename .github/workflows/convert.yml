name: Convert Ruleset
on:
  workflow_dispatch

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      # 🔥 唯一不会失败的 mihomo 下载方式
      - name: Download mihomo
        run: |
          curl -L -o mihomo https://github.com/MetaCubeX/mihomo/releases/download/v1.19.21/mihomo-linux-amd64-compatible-v1.19.21.gz
          chmod +x mihomo

      # 生成域名列表
      - name: Generate domain list
        run: |
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

      # 转换 MRS
      - name: Build MRS
        run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

      # 提交
      - name: Save to Repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update MRS"
          add: "10007.mrs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
