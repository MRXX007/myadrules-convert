name: Convert Ruleset
on:
  workflow_dispatch

jobs:
  run_convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4.2.2

      # 直接下载 mihomo 二进制文件，永不报错！
      - name: Download mihomo
        run: |
          curl -L -o mihomo https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64
          chmod +x mihomo

      # 生成域名列表
      - name: Generate list
        run: |
          curl -s https://raw.githubusercontent.com/lingeringsound/10007_auto/master/all | grep '^0\.0\.0\.0' | awk '{print $2}' > list.txt

      # 生成 MRS
      - name: Build MRS
        run: ./mihomo convert-ruleset domain text list.txt 10007.mrs

      # 自动提交（最稳定，不会卡死）
      - name: Save to repo
        uses: EndBug/add-and-commit@v9
        with:
          message: "Update MRS"
          add: "10007.mrs"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
